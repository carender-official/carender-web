<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>구독 결제 — 캐린더</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.iamport.kr/v1/iamport.js"></script>
  <style>
    body { font-family: 'Noto Sans KR', sans-serif; }
    .gradient-bg { background: linear-gradient(135deg, #f0f4ff 0%, #e8ecff 40%, #f5f0ff 100%); }
  </style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center px-4">

  <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-8 max-w-sm w-full text-center">
    <div id="loading">
      <div class="w-12 h-12 border-4 border-indigo-200 border-t-indigo-500 rounded-full animate-spin mx-auto mb-4"></div>
      <p class="text-slate-700 font-medium text-lg">결제창을 불러오는 중...</p>
      <p class="text-slate-400 text-sm mt-2">잠시만 기다려 주세요.</p>
    </div>
    <div id="error" class="hidden">
      <p class="text-red-500 font-medium text-lg mb-2">오류가 발생했습니다.</p>
      <p id="error-msg" class="text-slate-500 text-sm"></p>
    </div>

    <!-- 결제 전 동의 게이트 (전자상거래법 제17조 사전고지) -->
    <div id="consent" class="hidden text-left">
      <h1 class="text-lg font-bold text-slate-800 mb-3 text-center">결제 전 확인해 주세요</h1>
      <div class="rounded-xl bg-amber-50 border border-amber-200 text-amber-800 text-sm leading-relaxed p-4 space-y-2">
        <p>상품: <span id="consent-product" class="font-semibold"></span> (월 <span id="consent-amount" class="font-semibold"></span>원)</p>
        <p>매월 자동으로 결제되며, 설정 &gt; 플랜 변경 &gt; 구독 관리에서 언제든 해지할 수 있어요.</p>
        <p>결제 후 서비스 이용을 시작하면 「전자상거래법」 제17조에 따라
        청약철회(전액 환불)가 제한될 수 있습니다.</p>
      </div>
      <label class="flex items-start gap-2 mt-4 cursor-pointer select-none">
        <input type="checkbox" id="consent-check" class="mt-0.5 w-4 h-4 accent-indigo-600" />
        <span class="text-sm text-slate-700">위 결제 내용을 확인했으며 이에 동의합니다</span>
      </label>
      <button type="button" id="pay-proceed" disabled
        class="mt-5 w-full bg-indigo-500 hover:bg-indigo-600 active:bg-indigo-700 text-white font-semibold py-3 rounded-xl transition-colors disabled:opacity-40 disabled:cursor-not-allowed">
        결제 진행
      </button>
    </div>
  </div>

  <script>
    const params      = new URLSearchParams(window.location.search)
    const customerUid = params.get('customer_uid')
    const tierCode    = params.get('tier_code')   // fallback 금지: 누락 시 가드에서 차단

    // 티어별 결제 정보
    const TIER_INFO = {
      standard: { name: '캐린더 스탠다드 월 구독', amount: 1900 },
      pro:      { name: '캐린더 프리미엄 월 구독', amount: 2900 },
      premium:  { name: '캐린더 프리미엄 월 구독', amount: 2900 }, // 구 키 호환
    }
    // 유효한 tier_code 일 때만 매칭. 누락/미지정 값은 null → pro 로 fallback 결제 금지.
    const tier = (tierCode && TIER_INFO[tierCode]) ? TIER_INFO[tierCode] : null

    function showError(msg) {
      document.getElementById('loading').classList.add('hidden')
      document.getElementById('error').classList.remove('hidden')
      document.getElementById('error-msg').textContent = msg
    }

    // 결제 실행: 동의 후 '결제 진행' 클릭 시 호출.
    // IMP.request_pay 파라미터는 무수정 — 즉시 실행에서 함수로 추출했을 뿐.
    // IMP.init 도 이 시점으로 옮겨 iamport CDN 실패가 고지 표시를 막지 않게 한다.
    function startPayment() {
      IMP.init('imp12333754')

      console.log('[포트원] 결제 요청 — tier_code:', tierCode, '/ amount:', tier.amount)

      IMP.request_pay({
        pg:           'kcp_billing',
        pay_method:   'card',
        merchant_uid: 'order_' + Date.now(),
        name:         tier.name,
        amount:       tier.amount,
        customer_uid: customerUid,
        m_redirect_url: 'https://carender.kr/pay/done?customer_uid=' + encodeURIComponent(customerUid)
          + '&tier_code=' + encodeURIComponent(tierCode),
        custom_data: { tier_code: tierCode },
      }, function (rsp) {
        // PC 브라우저는 결과를 이 콜백으로 전달한다(모바일은 위 m_redirect_url 사용).
        console.log('[포트원] 결제 결과:', rsp)

        if (rsp.success) {
          window.location.href = 'https://carender.kr/pay/done?customer_uid='
            + encodeURIComponent(customerUid) + '&imp_success=true&imp_uid='
            + encodeURIComponent(rsp.imp_uid || '') + '&merchant_uid='
            + encodeURIComponent(rsp.merchant_uid || '') + '&tier_code='
            + encodeURIComponent(tierCode)
        } else {
          window.location.href = 'https://carender.kr/pay/done?customer_uid='
            + encodeURIComponent(customerUid) + '&imp_success=false&error_msg='
            + encodeURIComponent(rsp.error_msg || '알 수 없는 오류') + '&tier_code='
            + encodeURIComponent(tierCode)
        }
      })
    }

    // 초기 표시: customer_uid 없으면 기존 에러, 있으면 동의 게이트 먼저(결제는 버튼 클릭 후).
    if (!customerUid) {
      showError('잘못된 접근입니다. 캐린더 앱에서 다시 시도해 주세요.')
    } else if (!tier) {
      // tier_code 누락/미지정 → pro fallback 결제 금지. 게이트/결제 진행 안 함.
      showError('결제 정보를 확인할 수 없어요. 앱에서 다시 시도해 주세요.')
    } else {
      // 거래조건 동적 주입: 게이트 노출 직전에 상품명·금액 채움.
      document.getElementById('consent-product').textContent = tier.name
      document.getElementById('consent-amount').textContent  = tier.amount.toLocaleString()

      document.getElementById('loading').classList.add('hidden')
      document.getElementById('error').classList.add('hidden')
      document.getElementById('consent').classList.remove('hidden')

      const check   = document.getElementById('consent-check')
      const proceed = document.getElementById('pay-proceed')

      // 버튼 활성/비활성은 오직 체크박스 상태에만 연동
      check.addEventListener('change', function () {
        proceed.disabled = !check.checked
      })

      proceed.addEventListener('click', function () {
        if (!check.checked) return         // 게이트 이중 안전장치
        proceed.disabled = true             // 중복 클릭 방지
        document.getElementById('consent').classList.add('hidden')
        document.getElementById('loading').classList.remove('hidden')
        startPayment()
      })
    }
  </script>
</body>
</html>
