<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>결제 완료 — 캐린더</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Noto Sans KR', sans-serif; }
    .gradient-bg { background: linear-gradient(135deg, #f0f4ff 0%, #e8ecff 40%, #f5f0ff 100%); }
  </style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center px-4">

  <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-8 max-w-sm w-full text-center">

    <!-- 성공 -->
    <div id="view-success" class="hidden">
      <div class="w-16 h-16 bg-indigo-100 rounded-full flex items-center justify-center mx-auto mb-4">
        <svg class="w-8 h-8 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/>
        </svg>
      </div>
      <h2 class="text-xl font-bold text-slate-800 mb-3">결제가 처리되었어요.</h2>
      <p class="text-slate-500 text-sm">캐린더 앱으로 돌아가 주세요.</p>
    </div>

    <!-- 취소 / 실패 -->
    <div id="view-cancel" class="hidden">
      <div class="w-16 h-16 bg-slate-100 rounded-full flex items-center justify-center mx-auto mb-4">
        <svg class="w-8 h-8 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </div>
      <h2 class="text-xl font-bold text-slate-700 mb-2">결제가 취소되었거나<br/>완료되지 못했어요.</h2>
      <p id="cancel-error-msg" class="text-slate-400 text-xs mb-5 hidden"></p>
      <div class="flex flex-col gap-2">
        <button id="btn-retry"
          class="w-full text-sm font-medium py-2.5 rounded-xl bg-indigo-500 text-white hover:bg-indigo-600 active:bg-indigo-700 transition-colors">
          다시 시도
        </button>
        <button id="btn-close"
          class="w-full text-sm font-medium py-2.5 rounded-xl bg-slate-100 text-slate-500 hover:bg-slate-200 active:bg-slate-300 transition-colors">
          닫기
        </button>
      </div>
    </div>

    <!-- 결제 실패 (빌링키는 발급됐으나 서버 청구 실패) -->
    <div id="view-fail" class="hidden">
      <div class="w-16 h-16 bg-red-50 rounded-full flex items-center justify-center mx-auto mb-4">
        <svg class="w-8 h-8 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
        </svg>
      </div>
      <h2 class="text-xl font-bold text-slate-700 mb-2">결제를 완료하지 못했어요.</h2>
      <p id="fail-error-msg" class="text-slate-400 text-xs mb-5 hidden"></p>
      <div class="flex flex-col gap-2">
        <button id="btn-retry-fail"
          class="w-full text-sm font-medium py-2.5 rounded-xl bg-indigo-500 text-white hover:bg-indigo-600 active:bg-indigo-700 transition-colors">
          다시 시도
        </button>
        <button id="btn-close-fail"
          class="w-full text-sm font-medium py-2.5 rounded-xl bg-slate-100 text-slate-500 hover:bg-slate-200 active:bg-slate-300 transition-colors">
          닫기
        </button>
      </div>
    </div>

    <!-- 결과 불명 (파라미터 없음 → 타임아웃) -->
    <div id="view-unknown" class="hidden">
      <div class="w-16 h-16 bg-yellow-50 rounded-full flex items-center justify-center mx-auto mb-4">
        <svg class="w-8 h-8 text-yellow-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
        </svg>
      </div>
      <h2 class="text-xl font-bold text-slate-700 mb-2">결과를 확인할 수 없어요.</h2>
      <p class="text-slate-400 text-sm mb-5">다시 시도해 주세요.</p>
      <div class="flex flex-col gap-2">
        <button id="btn-retry-unknown"
          class="w-full text-sm font-medium py-2.5 rounded-xl bg-indigo-500 text-white hover:bg-indigo-600 active:bg-indigo-700 transition-colors">
          다시 시도
        </button>
        <button id="btn-close-unknown"
          class="w-full text-sm font-medium py-2.5 rounded-xl bg-slate-100 text-slate-500 hover:bg-slate-200 active:bg-slate-300 transition-colors">
          닫기
        </button>
      </div>
    </div>

    <!-- 대기 (파라미터 없을 때 타임아웃 전) -->
    <div id="view-waiting">
      <div class="w-12 h-12 border-4 border-indigo-200 border-t-indigo-500 rounded-full animate-spin mx-auto mb-4"></div>
      <p class="text-slate-500 text-sm">결과 확인 중...</p>
    </div>

  </div>

  <script>
    const params      = new URLSearchParams(window.location.search)
    const impSuccess  = params.get('imp_success')
    const errorMsg    = params.get('error_msg') || ''
    const customerUid = params.get('customer_uid') || ''
    const tierCode    = params.get('tier_code') || ''

    function show(id) {
      ['view-success', 'view-cancel', 'view-fail', 'view-unknown', 'view-waiting'].forEach(v => {
        document.getElementById(v).classList.toggle('hidden', v !== id)
      })
    }

    function showFail(msg) {
      const el = document.getElementById('fail-error-msg')
      if (msg) {
        el.textContent = msg
        el.classList.remove('hidden')
      } else {
        el.classList.add('hidden')
      }
      show('view-fail')
    }

    // 결제창 성공 후 서버 호출: 빌링키 기반 첫 청구(또는 체험 중이면 청구 예약).
    async function chargeViaServer() {
      if (!customerUid) { showFail('결제 정보를 확인할 수 없어요.'); return }
      const userId = customerUid.replace(/^customer_/, '')
      try {
        const res = await fetch('/api/billing', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ customer_uid: customerUid, user_id: userId, tier_code: tierCode }),
        })
        let data = {}
        try { data = await res.json() } catch {}
        if (res.ok && data.ok) {
          show('view-success')
        } else {
          showFail(data.reason || data.error || '결제 처리에 실패했어요.')
        }
      } catch (e) {
        showFail('네트워크 오류로 결제를 완료하지 못했어요.')
      }
    }

    function retryUrl() {
      if (!customerUid) return '/pay'
      let u = '/pay?customer_uid=' + encodeURIComponent(customerUid)
      if (tierCode) u += '&tier_code=' + encodeURIComponent(tierCode)
      return u
    }

    // 다시 시도 / 닫기 버튼 공통 바인딩
    document.getElementById('btn-retry').onclick        = () => { window.location.href = retryUrl() }
    document.getElementById('btn-close').onclick        = () => { window.close() }
    document.getElementById('btn-retry-unknown').onclick = () => { window.location.href = retryUrl() }
    document.getElementById('btn-close-unknown').onclick = () => { window.close() }
    document.getElementById('btn-retry-fail').onclick     = () => { window.location.href = retryUrl() }
    document.getElementById('btn-close-fail').onclick     = () => { window.close() }

    if (impSuccess === 'true') {
      // ── 결제창 성공 → 서버에 첫 청구/예약 요청 후 결과로 화면 분기 ──
      show('view-waiting')
      chargeViaServer()

    } else if (impSuccess === 'false') {
      // ── 실패 / 취소 ────────────────────────────────────────────
      show('view-cancel')
      if (errorMsg) {
        const el = document.getElementById('cancel-error-msg')
        el.textContent = errorMsg
        el.classList.remove('hidden')
      }

    } else {
      // ── 파라미터 없음: 10초 대기 후 결과 불명 안내 ─────────────
      show('view-waiting')
      setTimeout(() => show('view-unknown'), 10000)
    }
  </script>
</body>
</html>
