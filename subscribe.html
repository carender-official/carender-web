<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>구독 결제 — 캐린더</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <!-- 포트원 V1 SDK -->
  <script src="https://cdn.iamport.kr/v1/iamport.js"></script>
  <!-- Supabase (세션에서 user_id 조회용) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['"Noto Sans KR"', 'system-ui', 'sans-serif'] },
          colors: {
            brand: {
              50:  '#f0f4ff',
              100: '#e0eaff',
              200: '#c7d7fe',
              300: '#a5bafc',
              400: '#8196f8',
              500: '#6373f1',
              600: '#4f57e5',
              700: '#4145ca',
              800: '#363aa3',
              900: '#303681',
            }
          }
        }
      }
    }
  </script>
  <style>
    .gradient-bg {
      background: linear-gradient(135deg, #f0f4ff 0%, #e8ecff 40%, #f5f0ff 100%);
    }
  </style>
</head>
<body class="font-sans antialiased text-slate-800 gradient-bg min-h-screen">

  <header class="bg-white/80 backdrop-blur border-b border-slate-100 sticky top-0 z-10">
    <div class="max-w-3xl mx-auto px-6 py-4 flex items-center gap-4">
      <a href="index.html" class="text-slate-400 hover:text-slate-600 transition-colors flex items-center gap-2 text-sm">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
        </svg>
        메인으로
      </a>
      <span class="text-slate-300">|</span>
      <span class="font-semibold text-slate-700">캐린더</span>
      <span class="ml-auto text-xs text-slate-400 bg-amber-50 border border-amber-200 text-amber-600 px-2 py-0.5 rounded-full font-medium">테스트 모드</span>
    </div>
  </header>

  <main class="max-w-md mx-auto px-6 py-20">

    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-8 text-center">
      <div id="loading">
        <div class="w-12 h-12 border-4 border-brand-100 border-t-brand-500 rounded-full animate-spin mx-auto mb-5"></div>
        <p class="text-slate-700 font-medium text-lg">카드 등록창을 불러오는 중…</p>
        <p class="text-slate-400 text-sm mt-2">잠시만 기다려 주세요.</p>
        <p class="text-slate-400 text-xs mt-5 leading-relaxed">
          카드 정보는 포트원(KCP)을 통해 안전하게 처리됩니다.<br/>
          빌링키 발급만 진행되며 즉시 결제는 발생하지 않습니다.
        </p>
      </div>

      <!-- 결과 영역 (모바일 리다이렉트 복귀 / 결제 콜백 표시용) -->
      <div id="result-box" class="hidden rounded-xl p-5 text-sm leading-relaxed text-left"></div>
    </div>

  </main>

  <script>
    // 포트원 V1 초기화
    IMP.init("imp12333754");

    // Supabase (세션에서 user_id 조회용)
    const SUPABASE_URL = 'https://rjiprlqixjrqptnvxwsj.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_SLAee1GmoAXs4VbapQySpw_yYjj4c3z';
    const sb = (window.supabase && window.supabase.createClient)
      ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
      : null;

    const PLAN_INFO = {
      standard: { name: '캐린더 스탠다드 월 구독', amount: 1900 },
      pro:      { name: '캐린더 프리미엄 월 구독', amount: 2900 },
    };

    // 결제 실패/취소 시 "다시 시도" 버튼이 어떤 tier로 재시도할지 기억
    let currentTier = null;

    async function requestBilling(planKey, userId) {
      const plan = PLAN_INFO[planKey] || PLAN_INFO.pro;
      currentTier = planKey;

      // user_id가 전달되지 않았으면 세션에서 조회
      if (!userId && sb) {
        try {
          const { data: { session } } = await sb.auth.getSession();
          userId = session && session.user ? session.user.id : null;
        } catch (e) {
          console.warn("[구독] 세션 조회 실패:", e);
        }
      }

      const merchantUid  = "order_" + Date.now();
      const customerUid  = "customer_" + Math.random().toString(36).slice(2, 10);

      IMP.request_pay(
        {
          channelKey:    "channel-key-87100556-5f16-4e9b-9d05-73c4642704f0",
          pay_method:    "card",
          merchant_uid:  merchantUid,
          name:          plan.name,
          amount:        plan.amount,
          customer_uid:  customerUid,
          custom_data:   { user_id: userId || null, tier_code: planKey },
          m_redirect_url: "https://carender.kr/subscribe",
        },
        function (rsp) {
          console.log("[포트원 콜백]", rsp);

          if (rsp.success) {
            console.log("빌링키 발급 성공 — customer_uid:", customerUid);
            showResult("success", customerUid);
          } else {
            console.warn("빌링키 발급 실패 —", rsp.error_msg);
            showResult("error", rsp.error_msg);
          }
        }
      );
    }

    function showResult(type, detail) {
      // 결과가 나오면 로딩 스피너 숨김
      const loading = document.getElementById("loading");
      if (loading) loading.classList.add("hidden");

      const box = document.getElementById("result-box");
      box.classList.remove("hidden");

      if (type === "success") {
        box.className =
          "rounded-xl p-5 text-sm leading-relaxed bg-green-50 border border-green-200 text-green-800 text-left";
        box.innerHTML =
          "<div class='font-semibold text-base mb-1'>✅ 카드 등록(빌링키 발급) 성공</div>" +
          "<div class='text-green-700'>customer_uid: <code class='font-mono bg-green-100 px-1 rounded'>" +
          escapeHtml(detail) +
          "</code></div>" +
          "<div class='mt-2 text-green-600 text-xs'>콘솔(F12 → Console)에서 전체 응답을 확인할 수 있습니다.</div>";
      } else {
        box.className =
          "rounded-xl p-5 text-sm leading-relaxed bg-red-50 border border-red-200 text-red-800 text-left";
        const retryBtn = currentTier
          ? "<button type='button' onclick='retryBilling()' class='flex-1 bg-brand-600 hover:bg-brand-700 active:bg-brand-800 text-white font-semibold py-2.5 rounded-lg transition-colors'>다시 시도</button>"
          : "";
        box.innerHTML =
          "<div class='font-semibold text-base mb-1'>카드 등록이 완료되지 않았어요</div>" +
          "<div class='text-red-700'>" + escapeHtml(detail) + "</div>" +
          "<div class='mt-4 flex gap-2'>" +
            retryBtn +
            "<a href='/' class='flex-1 text-center border border-slate-300 hover:border-slate-400 hover:bg-white text-slate-700 font-semibold py-2.5 rounded-lg transition-colors'>홈으로</a>" +
          "</div>";
      }
    }

    // [다시 시도] — 같은 tier로 결제 재시작
    function retryBilling() {
      if (!currentTier || !PLAN_INFO[currentTier]) {
        window.location.href = "/";
        return;
      }
      // 결과 박스 숨기고 로딩 스피너 다시 보여주기
      const box = document.getElementById("result-box");
      const loading = document.getElementById("loading");
      if (box) box.classList.add("hidden");
      if (loading) loading.classList.remove("hidden");
      requestBilling(currentTier);
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    // 모바일 리다이렉트 후 결과 파라미터 처리 (m_redirect_url 복귀 시)
    (function checkRedirectResult() {
      const params = new URLSearchParams(window.location.search);
      const impSuccess = params.get("imp_success");
      if (impSuccess === null) return;

      if (impSuccess === "true") {
        console.log("[모바일 리다이렉트] 빌링키 발급 성공 — imp_uid:", params.get("imp_uid"));
        showResult("success", params.get("imp_uid") || "");
      } else {
        const errMsg = params.get("error_msg") || "알 수 없는 오류";
        console.warn("[모바일 리다이렉트] 빌링키 발급 실패 —", errMsg);
        showResult("error", errMsg);
      }

      // URL에서 파라미터 제거
      history.replaceState(null, "", window.location.pathname);
    })();

    // tier_code 쿼리로 진입하면 자동으로 결제창 호출 (홈 구독하기 버튼 흐름)
    (async function autoStartBilling() {
      const params = new URLSearchParams(window.location.search);

      // 모바일 리다이렉트 복귀(imp_success)는 결과 처리만 하고 자동 시작하지 않음
      if (params.get("imp_success") !== null) return;

      const tierCode = params.get("tier_code");
      if (!tierCode || !PLAN_INFO[tierCode]) {
        // 잘못된/누락된 진입 → 결제창 띄우지 말고 홈으로
        console.warn("[구독] tier_code 누락 또는 잘못된 값 — 홈으로 이동:", tierCode);
        window.location.replace("/");
        return;
      }

      if (!sb) {
        console.error("[구독] supabase-js 로드 실패 — 홈으로 이동");
        window.location.replace("/");
        return;
      }

      const { data: { session } } = await sb.auth.getSession();
      if (!session) {
        // 세션 없음 → 홈으로 보내 로그인부터 진행
        console.warn("[구독] 세션 없음 — 홈으로 이동하여 로그인이 필요합니다.");
        window.location.replace("/");
        return;
      }

      // 새로고침 시 중복 결제 방지: URL에서 tier_code 제거
      history.replaceState(null, "", window.location.pathname);

      requestBilling(tierCode, session.user.id);
    })();
  </script>

</body>
</html>
